<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Course Form - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #f8f9fa;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0 course-card" style="border-radius: 20px;">
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
          <h3 class="fw-bold page-title" th:text="${course.id == null ? 'Create New Course' : 'Edit Course'}">Course Form</h3>
        </div>
        <div class="card-body p-4 p-md-5">

          <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" enctype="multipart/form-data">
            <!-- Trường ẩn lưu ID để phân biệt Thêm hay Sửa -->
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label class="form-label fw-medium text-muted">Course Name</label>
              <input type="text" class="form-control form-control-lg rounded-pill px-4" th:field="*{name}" required placeholder="Ex: Spring Boot Advanced">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-medium text-muted">Lecturer Name</label>
                <input type="text" class="form-control form-control-lg rounded-pill px-4" th:field="*{lecturer}" required placeholder="Ex: John Doe">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-medium text-muted">Credits</label>
                <input type="number" class="form-control form-control-lg rounded-pill px-4" th:field="*{credits}" required min="1" max="10" placeholder="Ex: 3">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-medium text-muted">Category</label>
              <select class="form-select form-select-lg rounded-pill px-4" th:field="*{category}" required>
                <option value="" disabled selected>Select a Category...</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
              </select>
            </div>

            <div class="mb-5 border p-3 rounded" style="background-color: #f8f9fa;">
              <label class="form-label fw-medium text-muted">Upload Course Image</label>

              <!-- Nút chọn file ảnh từ máy tính -->
              <input type="file" class="form-control" name="imageFile" accept="image/png, image/jpeg, image/jpg">

              <!-- Hiển thị ảnh cũ nếu đang ở chế độ Edit -->
              <div th:if="${course.image != null and !course.image.isEmpty()}" class="mt-3">
                <p class="text-muted small mb-1">Current Image:</p>
                <img th:src="${course.image}" alt="Current Image" class="shadow-sm" style="height: 120px; border-radius: 10px; object-fit: cover;">
              </div>
            </div>

            <div class="d-flex justify-content-end gap-3">
              <a th:href="@{/admin/courses}" class="btn btn-light rounded-pill px-4 fw-medium text-secondary">Cancel</a>
              <button type="submit" class="btn btn-enroll rounded-pill px-5">
                <i class="bi bi-save me-1"></i> Save Course
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
