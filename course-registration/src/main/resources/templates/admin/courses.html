<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Courses - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #f8f9fa;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold page-title">Admin Dashboard: Courses</h2>
        <!-- Nút Thêm mới -->
        <a th:href="@{/admin/courses/add}" class="btn btn-enroll px-4 rounded-pill">
            <i class="bi bi-plus-lg me-1"></i> Add New Course
        </a>
    </div>

    <!-- Thông báo thao tác -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm text-center border-0 rounded-pill" role="alert" style="background-color: #d4edda; color: #155724;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show shadow-sm text-center border-0 rounded-pill" role="alert" style="background-color: #f8d7da; color: #721c24;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Bảng danh sách Học phần -->
    <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Image</th>
                    <th>Course Name</th>
                    <th>Category</th>
                    <th>Lecturer</th>
                    <th>Credits</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td class="ps-4">
                        <img th:src="${course.image}" alt="Course" class="rounded" style="width: 60px; height: 40px; object-fit: cover;">
                    </td>
                    <td class="fw-bold text-dark" th:text="${course.name}"></td>
                    <td><span class="badge bg-secondary rounded-pill" th:text="${course.category.name}"></span></td>
                    <td th:text="${course.lecturer}"></td>
                    <td th:text="${course.credits}"></td>
                    <td class="text-end pe-4">
                        <!-- Nút Sửa -->
                        <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-primary rounded-pill px-3 me-2">
                            <i class="bi bi-pencil-square"></i> Edit
                        </a>
                        <!-- Nút Xóa (Kèm xác nhận JS) -->
                        <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                           onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này không?');">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
