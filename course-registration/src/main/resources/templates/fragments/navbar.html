<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3"
     th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}" style="color: #764ba2;">
            <i class="bi bi-mortarboard-fill me-2"></i>UniCourse
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Form Tìm kiếm (Câu 8) -->
            <form class="d-flex mx-auto w-50" th:action="@{/home}" method="get">
                <div class="input-group search-bar-custom rounded-pill overflow-hidden">
                    <input type="text" class="form-control border-0 shadow-none bg-transparent"
                           placeholder="Search courses..." name="keyword" th:value="${keyword}"
                           aria-label="Search" style="padding-left: 1.5rem;">
                    <button class="btn border-0 bg-transparent text-secondary" type="submit" style="padding-right: 1.2rem;">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>

            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link fw-medium" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('STUDENT')">
                    <a class="nav-link fw-medium" th:href="@{/my-courses}">My Courses</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link fw-medium" th:href="@{/admin/courses}">Admin Panel</a>
                </li>

                <!-- Authentication -->
                <li class="nav-item ms-3" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-primary rounded-pill px-4" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item ms-3 dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle fw-bold" href="#" data-bs-toggle="dropdown">
                        Hello, <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
