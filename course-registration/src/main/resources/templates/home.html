<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration - Home</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Nhúng Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-5">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm text-center border-0 rounded-pill" role="alert" style="background-color: #d4edda; color: #155724;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-warning alert-dismissible fade show shadow-sm text-center border-0 rounded-pill" role="alert" style="background-color: #fff3cd; color: #856404;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="text-center mb-5">
        <h1 class="display-4 page-title">Explore Our Courses</h1>
        <p class="text-muted lead">Expand your knowledge with our top-tier curriculum</p>
    </div>

    <!-- Course Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="course : ${coursePage.content}">
            <div class="card h-100 course-card">
                <img th:src="${course.image}" class="card-img-top" alt="Course Image">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-info text-dark mb-3 align-self-start px-3 py-2 rounded-pill shadow-sm" th:text="${course.category.name}">IT</span>
                    <h5 class="card-title fw-bold" th:text="${course.name}">Spring Boot Mastery</h5>
                    <p class="card-text text-muted mb-1"><i class="bi bi-person-video3 me-2"></i>Lecturer: <span th:text="${course.lecturer}">John Doe</span></p>
                    <p class="card-text text-muted"><i class="bi bi-journal-bookmark me-2"></i>Credits: <span th:text="${course.credits}">3</span></p>

                    <div class="mt-auto pt-3 border-top" sec:authorize="hasAuthority('STUDENT')">
                        <form th:action="@{/enroll}" method="post">
                            <input type="hidden" name="courseId" th:value="${course.id}" />
                            <button type="submit" class="btn btn-enroll w-100">
                                <i class="bi bi-plus-circle me-1"></i> Enroll Now
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Phân trang -->
    <nav aria-label="Page navigation" class="mt-5" th:if="${coursePage != null and coursePage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${coursePage.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/home(page=${coursePage.number - 1}, keyword=${keyword})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, coursePage.totalPages - 1)}"
                th:classappend="${coursePage.number == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${coursePage.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/home(page=${coursePage.number + 1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
