<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center justify-content-center vh-100" style="background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);">

<div class="card p-4 shadow-lg border-0 course-card" style="width: 25rem; border-radius: 20px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #764ba2;">Welcome Back!</h2>
        <p class="text-muted">Please login to your account</p>
    </div>

    <!-- Thông báo lỗi hoặc thành công -->
    <div th:if="${param.error}" class="alert alert-danger p-2 text-center">Tài khoản hoặc mật khẩu không đúng!</div>
    <div th:if="${param.logout}" class="alert alert-success p-2 text-center">Bạn đã đăng xuất thành công!</div>
    <div th:if="${param.success}" class="alert alert-success p-2 text-center">Đăng ký thành công! Hãy đăng nhập.</div>

    <!-- Form đăng nhập mặc định (Spring Security xử lý) -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-medium">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" name="username" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-medium">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" name="password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-enroll w-100 mb-3">Login</button>
    </form>

    <div class="text-center text-muted mb-3">OR</div>

    <!-- Câu 9: Nút Đăng nhập bằng Google -->
    <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 fw-medium">
        <i class="bi bi-google me-2"></i> Login with Google
    </a>

    <div class="text-center mt-4">
        <span class="text-muted">Don't have an account? </span>
        <a th:href="@{/register}" class="text-decoration-none fw-bold" style="color: #764ba2;">Register here</a>
    </div>
</div>

</body>
</html>
