<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-5">
    <div class="text-center mb-5">
        <h1 class="display-4 page-title">My Learning Space</h1>
        <p class="text-muted lead">Your enrolled courses and progress</p>
    </div>

    <!-- Hiển thị khi chưa đăng ký môn nào -->
    <div th:if="${enrollments.empty}" class="text-center mt-5">
        <i class="bi bi-folder-x text-muted" style="font-size: 5rem; opacity: 0.5;"></i>
        <h4 class="text-muted mt-3 fw-medium">You haven't enrolled in any courses yet.</h4>
        <a th:href="@{/home}" class="btn btn-enroll mt-4 px-4 py-2">Browse Courses to Enroll</a>
    </div>

    <!-- Grid chứa các khóa học đã đăng ký -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:unless="${enrollments.empty}">
        <div class="col" th:each="enrollment : ${enrollments}">
            <div class="card h-100 course-card">
                <img th:src="${enrollment.course.image}" class="card-img-top" alt="Course Image">
                <div class="card-body d-flex flex-column">

                    <!-- Badge hiển thị Ngày đăng ký (Format dd-MM-yyyy) -->
                    <span class="badge bg-success text-white mb-3 align-self-start px-3 py-2 rounded-pill shadow-sm">
                        <i class="bi bi-calendar-check me-1"></i> Enrolled: <span th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy')}"></span>
                    </span>

                    <h5 class="card-title fw-bold text-dark" th:text="${enrollment.course.name}">Course Name</h5>
                    <p class="card-text text-muted mb-1"><i class="bi bi-person-video3 me-2"></i>Lecturer: <span th:text="${enrollment.course.lecturer}"></span></p>
                    <p class="card-text text-muted"><i class="bi bi-journal-bookmark me-2"></i>Credits: <span th:text="${enrollment.course.credits}"></span></p>

                    <div class="mt-auto pt-3 border-top">
                        <button class="btn btn-outline-primary w-100 rounded-pill fw-medium" disabled>
                            <i class="bi bi-play-circle me-1"></i> Continue Learning
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
