<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center justify-content-center vh-100" style="background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);">

<div class="card p-4 shadow-lg border-0 course-card" style="width: 25rem; border-radius: 20px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #764ba2;">Create Account</h2>
        <p class="text-muted">Join us to enroll in top courses</p>
    </div>

    <div th:if="${error}" class="alert alert-danger p-2 text-center" th:text="${error}"></div>

    <!-- Form Đăng ký -->
    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label fw-medium">Username</label>
            <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-medium">Email Address</label>
            <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-medium">Password</label>
            <input type="password" class="form-control" name="password" required>
        </div>

        <button type="submit" class="btn btn-enroll w-100 mb-3">Register Now</button>
    </form>

    <div class="text-center mt-3">
        <span class="text-muted">Already have an account? </span>
        <a th:href="@{/login}" class="text-decoration-none fw-bold" style="color: #764ba2;">Login here</a>
    </div>
</div>

</body>
</html>
